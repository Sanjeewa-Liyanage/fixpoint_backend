server {
    listen 8080;
    listen [::]:8080;
    root /home/site/wwwroot;
    index index.php index.html;

    server_name _;

    # 1. Allow all /playground and let PHP handle it through /src/playground/index.php
    location ^~ /playground {
        try_files $uri $uri/ /src/playground/index.php$is_args$args;
    }

    # 2. Route everything else to index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # 3. PHP execution block
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
    }

    # 4. Deny access to hidden files like .git
    location ~ /\. {
        deny all;
    }
}
